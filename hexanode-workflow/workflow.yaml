# HexaNode Workflow Configuration
# https://docs.chain.link/cre/reference/project-configuration-ts

staging-settings:
  user-workflow:
    workflow-name: "hexanode-procurement-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "hexanode-procurement-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
